<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrada de Equipamentos - Assistência</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* --- ESTILO GERAL DO FORMULÁRIO (RESTAURADO) --- */
    :root {
      --cor-primaria: #002060;
      --cor-fundo: #8ad6cf;
      --cor-card: #ffffff;
      --cor-borda: #dee2e6;
      --cor-sombra: rgba(0, 0, 0, 0.1);
      --cor-texto: #495057;
      --cor-titulo: #212529;
      --cor-sucesso: #28a745;
      --cor-sucesso-hover: #218838;
      --cor-perigo: #dc3545;
      --cor-perigo-hover: #c82333;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Rubik", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
    }

    h1 { text-align: center; color: var(--cor-titulo); margin-bottom: 5px;}
    
    .status-bd { 
      text-align: center; 
      font-size: 14px; 
      font-weight: bold; 
      margin-bottom: 20px; 
      color: #002060; 
      background-color: rgba(255, 255, 255, 0.5);
      padding: 10px;
      border-radius: 8px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .form-section {
      border: 1px solid var(--cor-borda); 
      padding: 20px; 
      margin: 20px auto; 
      border-radius: 8px; 
      background-color: var(--cor-card);
      box-shadow: 0 4px 8px var(--cor-sombra);
      max-width: 900px;
    }

    .form-section h2 {
      margin-top: 0;
      border-bottom: 2px solid var(--cor-primaria);
      padding-bottom: 10px;
      color: var(--cor-primaria);
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-row { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 15px; 
      margin-bottom: 15px; 
    }
    
    .form-group { margin-bottom: 10px; }
    .form-group.full-width { grid-column: 1 / -1; }
    
    label { 
      display: block; 
      font-weight: bold; 
      margin-bottom: 5px; 
      color: var(--cor-titulo); 
      font-size: 14px;
    }
    
    input[type="text"], input[type="number"], input[type="date"], input[type="time"] {
      width: 100%; 
      padding: 10px; 
      border-radius: 4px; 
      border: 1px solid var(--cor-borda); 
      font-size: 14px; 
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus { outline: none; border-color: var(--cor-primaria); }

    input:read-only {
      background-color: #e9ecef;
      color: #495057;
      cursor: not-allowed;
    }

    /* ESTILOS DA IMAGEM ADAPTADOS AO LAYOUT ORIGINAL */
    .imagem-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      background-color: #f8f9fa;
      border: 2px dashed var(--cor-borda);
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
    }

    .imagem-container img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      display: none;
    }

    .imagem-placeholder {
      text-align: center;
      color: #6c757d;
      font-size: 14px;
      font-weight: bold;
    }

    /* BOTÃO PRINCIPAL */
    .btn-principal { 
      width: 100%; 
      padding: 15px; 
      font-size: 18px; 
      font-weight: bold;
      background-color: var(--cor-sucesso); 
      color: white; 
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px; 
      transition: background-color 0.2s;
    }
    .btn-principal:hover { background-color: var(--cor-sucesso-hover); }
    .btn-principal:disabled { background-color: #6c757d; cursor: not-allowed; }
    
    .action-container { max-width: 900px; margin: 0 auto; }

    #statusMensagem {
        text-align: center;
        font-weight: bold;
        margin-top: 15px;
        font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>Registro de Entrada de Equipamentos</h1>
  <div class="status-bd" id="statusBD">⏳ Conectando ao Banco de Dados (datashock.ods)...</div>

  <form id="entradaForm">
    
    <div class="form-section">
      <h2>Dados de Entrada e Equipamento</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label>Agendamento (Col A):</label>
          <input type="number" id="agendamento" required placeholder="Número do agendamento">
        </div>
        <div class="form-group">
          <label>Código do Equipamento (Col B):</label>
          <input type="text" id="codigo" required placeholder="Digite o código (ex: 123)" onblur="processarCodigo(this)">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label>Nome do Equipamento (Col C):</label>
          <input type="text" id="nomeEquipamento" required readonly placeholder="Será preenchido automaticamente pela planilha">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Data Atual (Col F):</label>
          <input type="text" id="dataAtual" required readonly>
        </div>
        <div class="form-group">
          <label>Horário Atual (Col G):</label>
          <input type="text" id="horarioAtual" required readonly>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Foto do Equipamento</h2>
      <div class="imagem-container" id="containerFoto">
        <div class="imagem-placeholder" id="placeholderFoto">
          Aguardando preenchimento do código...<br>
          <span style="font-size: 12px; font-weight: normal;">(A imagem deve estar na pasta "img" no formato .jpg)</span>
        </div>
        <img id="fotoEquipamento" src="" alt="Foto do Equipamento" onerror="erroImagem()">
      </div>
    </div>

    <div class="action-container">
      <button type="submit" class="btn-principal" id="btnGerar">Registrar na Planilha de Agendamentos</button>
      <div id="statusMensagem"></div>
    </div>

  </form>

  <script>
    // ==========================================
    // CONFIGURAÇÕES
    // ==========================================
    // Substitua a URL abaixo pela gerada no seu Google Apps Script (Passo 1)
    const GOOGLE_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby71jdg4zcudOYmfj_yI1_a-K_KCtuw-1EoX14ki61y8Co681HHSFWOdXtsQPcNpP-xvg/exec'; 
    
    let bancoXML = {};

    // ==========================================
    // INICIALIZAÇÃO
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      iniciarRelogio();
      carregarBancoDeDadosODS();
    });

    // Atualiza os campos de Data e Hora em tempo real
    function iniciarRelogio() {
      atualizarDataHora();
      setInterval(atualizarDataHora, 1000);
    }

    function atualizarDataHora() {
      const campoData = document.getElementById('dataAtual');
      const campoHorario = document.getElementById('horarioAtual');
      const agora = new Date();
      
      campoData.value = agora.toLocaleDateString('pt-BR');
      campoHorario.value = agora.toLocaleTimeString('pt-BR');
    }

    // ==========================================
    // LEITURA DO ARQUIVO ODS (DATASHOCK.ODS)
    // ==========================================
    async function carregarBancoDeDadosODS() {
      const statusElement = document.getElementById('statusBD');
      try {
        const response = await fetch('datashock.ods');
        if (!response.ok) throw new Error("Arquivo não encontrado.");
        
        const arrayBuffer = await response.arrayBuffer();
        const data = new Uint8Array(arrayBuffer);
        const workbook = XLSX.read(data, {type: 'array'});
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
        
        let qtdCarregada = 0;

        for(let i = 1; i < jsonData.length; i++) {
          let linha = jsonData[i];
          if(linha && linha[0] && linha[1]) {
            let cod = linha[0].toString().trim();
            let nome = linha[1].toString().trim();
            // Padroniza com 6 dígitos ao carregar na memória
            bancoXML[cod.padStart(6, '0')] = nome;
            qtdCarregada++;
          }
        }
        
        statusElement.textContent = `✅ Banco de Dados Carregado (${qtdCarregada} itens prontas)`;
        statusElement.style.color = '#002060';
        statusElement.style.backgroundColor = '#e8f5e9';
      } catch (error) {
        console.warn(error);
        statusElement.textContent = "⚠️ Não foi possível carregar 'datashock.ods'. Verifique o arquivo.";
        statusElement.style.color = '#dc3545';
        statusElement.style.backgroundColor = '#f8d7da';
        
        document.getElementById('nomeEquipamento').readOnly = false;
        document.getElementById('nomeEquipamento').placeholder = "Digite manualmente, BD offline.";
      }
    }

    // ==========================================
    // LÓGICA DE PREENCHIMENTO E IMAGEM
    // ==========================================
    function processarCodigo(inputElement) {
      let valorOriginal = inputElement.value.trim();
      
      if (!valorOriginal) {
        resetarVisualizacao();
        return;
      }

      // Regra de arredondamento para 6 dígitos
      let codigoFormatado = valorOriginal.padStart(6, '0');
      inputElement.value = codigoFormatado;

      // Buscar Nome
      const campoNome = document.getElementById('nomeEquipamento');
      if (bancoXML[codigoFormatado]) {
        campoNome.value = bancoXML[codigoFormatado];
        campoNome.style.borderColor = "var(--cor-sucesso)";
      } else {
        campoNome.value = "Equipamento não localizado";
        campoNome.style.borderColor = "var(--cor-perigo)";
      }

      // Buscar Imagem
      carregarImagem(codigoFormatado);
    }

    function carregarImagem(codigo) {
      const imgElement = document.getElementById('fotoEquipamento');
      const placeholder = document.getElementById('placeholderFoto');
      
      placeholder.style.display = 'none';
      imgElement.style.display = 'block';
      imgElement.src = `img/${codigo}.jpg`; 
    }

    function erroImagem() {
      const imgElement = document.getElementById('fotoEquipamento');
      const placeholder = document.getElementById('placeholderFoto');
      
      imgElement.style.display = 'none';
      placeholder.style.display = 'block';
      placeholder.innerHTML = `<span style="color: var(--cor-perigo);">❌ Foto (img/${imgElement.src.split('/').pop()}) não encontrada na pasta.</span>`;
    }

    function resetarVisualizacao() {
      document.getElementById('nomeEquipamento').value = '';
      document.getElementById('nomeEquipamento').style.borderColor = "var(--cor-borda)";
      document.getElementById('fotoEquipamento').style.display = 'none';
      
      const placeholder = document.getElementById('placeholderFoto');
      placeholder.style.display = 'block';
      placeholder.innerHTML = 'Aguardando preenchimento do código...<br><span style="font-size: 12px; font-weight: normal;">(A imagem deve estar na pasta "img" no formato .jpg)</span>';
    }

    // ==========================================
    // ENVIO PARA O GOOGLE SHEETS
    // ==========================================
    document.getElementById('entradaForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      if (GOOGLE_WEBAPP_URL === 'COLE_AQUI_A_URL_DO_SEU_WEB_APP') {
        alert("Atenção: Você precisa colar a URL do seu Google Apps Script na constante GOOGLE_WEBAPP_URL no código fonte.");
        return;
      }

      const btn = document.getElementById('btnGerar');
      const statusMsg = document.getElementById('statusMensagem');
      
      btn.disabled = true;
      btn.textContent = '⏳ Processando e Enviando...';
      statusMsg.textContent = '';

      // Monta o JSON com os dados das colunas mapeadas
      const payload = {
        agendamento: document.getElementById('agendamento').value.trim(),
        codigo: document.getElementById('codigo').value.trim(),
        equipamento: document.getElementById('nomeEquipamento').value.trim(),
        data: document.getElementById('dataAtual').value,
        horario: document.getElementById('horarioAtual').value
      };

      try {
        await fetch(GOOGLE_WEBAPP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        // Efeito de sucesso
        statusMsg.style.color = 'var(--cor-sucesso)';
        statusMsg.textContent = '✅ Sucesso! Agendamento registrado com as Colunas A, B, C, F e G.';
        
        // Limpa formulário
        document.getElementById('entradaForm').reset();
        resetarVisualizacao();
        atualizarDataHora(); 

      } catch (error) {
        console.error("Erro no fetch:", error);
        statusMsg.style.color = 'var(--cor-perigo)';
        statusMsg.textContent = '❌ Ocorreu um erro ao conectar com a Planilha.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Registrar na Planilha de Agendamentos';
      }
    });
  </script>
</body>
</html>
