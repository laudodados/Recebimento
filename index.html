<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrada de Equipamentos - Assistência</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* --- ESTILO GERAL DO FORMULÁRIO --- */
    :root {
      --cor-primaria: #002060;
      --cor-fundo: #8ad6cf;
      --cor-card: #ffffff;
      --cor-borda: #dee2e6;
      --cor-sombra: rgba(0, 0, 0, 0.1);
      --cor-texto: #495057;
      --cor-titulo: #212529;
      --cor-sucesso: #28a745;
      --cor-sucesso-hover: #218838;
      --cor-perigo: #dc3545;
      --cor-perigo-hover: #c82333;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Rubik", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
    }

    h1 { text-align: center; color: var(--cor-titulo); margin-bottom: 5px;}
    
    .status-bd { 
      text-align: center; 
      font-size: 14px; 
      font-weight: bold; 
      margin-bottom: 20px; 
      color: #002060; 
      background-color: rgba(255, 255, 255, 0.5);
      padding: 10px;
      border-radius: 8px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .form-section {
      border: 1px solid var(--cor-borda); 
      padding: 20px; 
      margin: 20px auto; 
      border-radius: 8px; 
      background-color: var(--cor-card);
      box-shadow: 0 4px 8px var(--cor-sombra);
      max-width: 900px;
    }

    .form-section h2 {
      margin-top: 0;
      border-bottom: 2px solid var(--cor-primaria);
      padding-bottom: 10px;
      color: var(--cor-primaria);
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-row { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 15px; 
      margin-bottom: 15px; 
    }
    
    .form-group { margin-bottom: 10px; }
    
    label { 
      display: block; 
      font-weight: bold; 
      margin-bottom: 5px; 
      color: var(--cor-titulo); 
      font-size: 14px;
    }
    
    input[type="text"], input[type="number"] {
      width: 100%; 
      padding: 10px; 
      border-radius: 4px; 
      border: 1px solid var(--cor-borda); 
      font-size: 14px; 
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus { outline: none; border-color: var(--cor-primaria); }
    input:read-only { background-color: #e9ecef; color: #495057; cursor: not-allowed; }

    /* ESTILOS DOS ITENS DINÂMICOS */
    .item-equipamento {
      background-color: #f8f9fa;
      border: 1px solid var(--cor-borda);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      position: relative;
      display: flex;
      gap: 20px;
    }

    .item-dados { flex: 2; }
    .item-foto-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
      border: 2px dashed var(--cor-borda);
      border-radius: 6px;
      min-height: 120px;
      max-width: 200px;
      padding: 5px;
      text-align: center;
      overflow: hidden;
    }

    .item-foto-container img {
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
      display: none;
    }

    .item-foto-placeholder {
      font-size: 12px;
      color: #6c757d;
    }

    .btn-adicionar {
      background-color: var(--cor-primaria);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    .btn-adicionar:hover { background-color: #001540; }

    .btn-remover {
      background-color: var(--cor-perigo);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      position: absolute;
      top: 15px;
      right: 15px;
    }
    .btn-remover:hover { background-color: var(--cor-perigo-hover); }

    /* BOTÃO PRINCIPAL */
    .btn-principal { 
      width: 100%; 
      padding: 15px; 
      font-size: 18px; 
      font-weight: bold;
      background-color: var(--cor-sucesso); 
      color: white; 
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px; 
      transition: background-color 0.2s;
    }
    .btn-principal:hover { background-color: var(--cor-sucesso-hover); }
    .btn-principal:disabled { background-color: #6c757d; cursor: not-allowed; }
    
    .action-container { max-width: 900px; margin: 0 auto; }

    #statusMensagem {
        text-align: center;
        font-weight: bold;
        margin-top: 15px;
        font-size: 16px;
    }

    /* Ajuste para telas menores */
    @media (max-width: 600px) {
      .item-equipamento { flex-direction: column; }
      .item-foto-container { max-width: 100%; min-height: 150px; }
    }
  </style>
</head>
<body>

  <h1>Registro de Entrada de Equipamentos</h1>
  <div class="status-bd" id="statusBD">⏳ Conectando ao Banco de Dados (datashock.ods)...</div>

  <form id="entradaForm">
    
    <div class="form-section">
      <h2>Dados Gerais</h2>
      
      <div class="form-row">
        <div class="form-group">
          <label>Agendamento (Col A):</label>
          <input type="number" id="agendamento" required placeholder="Número do agendamento">
        </div>
        <div class="form-group">
          <label>Cliente (Col B):</label>
          <input type="text" id="cliente" required placeholder="Nome do Cliente">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Data Atual (Col G):</label>
          <input type="text" id="dataAtual" required readonly>
        </div>
        <div class="form-group">
          <label>Horário Atual (Col H):</label>
          <input type="text" id="horarioAtual" required readonly>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>
        Equipamentos
        <button type="button" class="btn-adicionar" onclick="adicionarEquipamento()">+ Adicionar Produto</button>
      </h2>
      
      <div id="containerEquipamentos">
        </div>
    </div>

    <div class="action-container">
      <button type="submit" class="btn-principal" id="btnGerar">Registrar na Planilha</button>
      <div id="statusMensagem"></div>
    </div>

  </form>

  <script>
    // ==========================================
    // CONFIGURAÇÕES GERAIS
    // ==========================================
    const GOOGLE_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby71jdg4zcudOYmfj_yI1_a-K_KCtuw-1EoX14ki61y8Co681HHSFWOdXtsQPcNpP-xvg/exec'; 
    let bancoXML = {};
    let itemCount = 0;

    // ==========================================
    // INICIALIZAÇÃO
    // ==========================================
    document.addEventListener("DOMContentLoaded", () => {
      iniciarRelogio();
      carregarBancoDeDadosODS();
      adicionarEquipamento(); // Adiciona o primeiro slot obrigatório
    });

    function iniciarRelogio() {
      atualizarDataHora();
      setInterval(atualizarDataHora, 1000);
    }

    function atualizarDataHora() {
      const agora = new Date();
      document.getElementById('dataAtual').value = agora.toLocaleDateString('pt-BR');
      document.getElementById('horarioAtual').value = agora.toLocaleTimeString('pt-BR');
    }

    // ==========================================
    // LEITURA DO ARQUIVO ODS
    // ==========================================
    async function carregarBancoDeDadosODS() {
      const statusElement = document.getElementById('statusBD');
      try {
        const response = await fetch('datashock.ods');
        if (!response.ok) throw new Error("Arquivo não encontrado.");
        
        const arrayBuffer = await response.arrayBuffer();
        const data = new Uint8Array(arrayBuffer);
        const workbook = XLSX.read(data, {type: 'array'});
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1});
        
        let qtdCarregada = 0;

        for(let i = 1; i < jsonData.length; i++) {
          let linha = jsonData[i];
          if(linha && linha[0] && linha[1]) {
            let cod = linha[0].toString().trim();
            let nome = linha[1].toString().trim();
            bancoXML[cod.padStart(6, '0')] = nome; // Padroniza para 6 dígitos
            qtdCarregada++;
          }
        }
        
        statusElement.textContent = `✅ Banco de Dados Carregado (${qtdCarregada} itens)`;
        statusElement.style.color = '#002060';
        statusElement.style.backgroundColor = '#e8f5e9';
      } catch (error) {
        console.warn(error);
        statusElement.textContent = "⚠️ 'datashock.ods' offline. Modo manual ativado.";
        statusElement.style.color = '#dc3545';
        statusElement.style.backgroundColor = '#f8d7da';
      }
    }

    // ==========================================
    // LÓGICA DE MÚLTIPLOS EQUIPAMENTOS
    // ==========================================
    function adicionarEquipamento() {
      itemCount++;
      const id = itemCount;
      const container = document.getElementById('containerEquipamentos');
      
      const div = document.createElement('div');
      div.className = 'item-equipamento';
      div.id = `item_${id}`;
      
      div.innerHTML = `
        <div class="item-dados">
          <div style="font-weight: bold; color: var(--cor-primaria); margin-bottom: 10px;">
            Produto #${id}
          </div>
          <div class="form-group">
            <label>Código (Col C):</label>
            <input type="text" class="input-codigo" required placeholder="Digite o código" onblur="processarCodigo(this, ${id})">
          </div>
          <div class="form-group">
            <label>Nome do Equipamento (Col D):</label>
            <input type="text" id="nome_${id}" class="input-nome" required readonly placeholder="Aguardando código...">
          </div>
        </div>
        
        <div class="item-foto-container">
          <div class="item-foto-placeholder" id="placeholder_${id}">Foto do Item</div>
          <img id="foto_${id}" src="" onerror="erroImagem(${id}, this)">
        </div>

        ${id > 1 ? `<button type="button" class="btn-remover" onclick="removerEquipamento(${id})">Excluir</button>` : ''}
      `;
      
      container.appendChild(div);

      // Se o banco falhou no carregamento, libera os campos de nome para edição
      if(Object.keys(bancoXML).length === 0) {
        document.getElementById(`nome_${id}`).readOnly = false;
        document.getElementById(`nome_${id}`).placeholder = "Digite o nome...";
      }
    }

    function removerEquipamento(id) {
      const elemento = document.getElementById(`item_${id}`);
      if(elemento) elemento.remove();
    }

    function processarCodigo(inputElement, id) {
      let valorOriginal = inputElement.value.trim();
      const campoNome = document.getElementById(`nome_${id}`);
      const imgElement = document.getElementById(`foto_${id}`);
      const placeholder = document.getElementById(`placeholder_${id}`);
      
      if (!valorOriginal) {
        campoNome.value = '';
        campoNome.style.borderColor = "var(--cor-borda)";
        imgElement.style.display = 'none';
        placeholder.style.display = 'block';
        placeholder.innerHTML = 'Foto do Item';
        return;
      }

      // Regra: Arredonda sempre para 6 dígitos
      let codigoFormatado = valorOriginal.padStart(6, '0');
      inputElement.value = codigoFormatado;

      // Busca Nome
      if (Object.keys(bancoXML).length > 0) {
        if (bancoXML[codigoFormatado]) {
          campoNome.value = bancoXML[codigoFormatado];
          campoNome.style.borderColor = "var(--cor-sucesso)";
        } else {
          campoNome.value = "Não localizado";
          campoNome.style.borderColor = "var(--cor-perigo)";
        }
      }

      // Busca Imagem
      placeholder.style.display = 'none';
      imgElement.style.display = 'block';
      imgElement.src = `img/${codigoFormatado}.png`; 
    }

    function erroImagem(id, imgElement) {
      const placeholder = document.getElementById(`placeholder_${id}`);
      imgElement.style.display = 'none';
      placeholder.style.display = 'block';
      placeholder.innerHTML = `<span style="color: var(--cor-perigo);">❌ Sem Foto<br><small>(${imgElement.src.split('/').pop()})</small></span>`;
    }

    // ==========================================
    // ENVIO DOS DADOS AO GOOGLE SHEETS
    // ==========================================
    document.getElementById('entradaForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('btnGerar');
      const statusMsg = document.getElementById('statusMensagem');
      
      btn.disabled = true;
      btn.textContent = '⏳ Processando e Enviando...';
      statusMsg.textContent = '';

      // Coleta os equipamentos preenchidos
      const equipamentosArray = [];
      const itensHtml = document.querySelectorAll('.item-equipamento');
      
      itensHtml.forEach(item => {
        const cod = item.querySelector('.input-codigo').value.trim();
        const nome = item.querySelector('.input-nome').value.trim();
        if (cod && nome) {
          equipamentosArray.push({ codigo: cod, equipamento: nome });
        }
      });

      if (equipamentosArray.length === 0) {
        statusMsg.style.color = 'var(--cor-perigo)';
        statusMsg.textContent = '⚠️ Adicione pelo menos um equipamento válido.';
        btn.disabled = false;
        btn.textContent = 'Registrar na Planilha';
        return;
      }

      // Monta o pacote de dados (Payload)
      const payload = {
        agendamento: document.getElementById('agendamento').value.trim(),
        cliente: document.getElementById('cliente').value.trim(),
        data: document.getElementById('dataAtual').value,
        horario: document.getElementById('horarioAtual').value,
        equipamentos: equipamentosArray
      };

      try {
        await fetch(GOOGLE_WEBAPP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        statusMsg.style.color = 'var(--cor-sucesso)';
        statusMsg.textContent = `✅ Sucesso! ${equipamentosArray.length} produto(s) registrado(s) para o Agendamento ${payload.agendamento}.`;
        
        // Limpa e reseta o formulário
        document.getElementById('entradaForm').reset();
        document.getElementById('containerEquipamentos').innerHTML = '';
        itemCount = 0;
        adicionarEquipamento();
        atualizarDataHora(); 

      } catch (error) {
        console.error("Erro no fetch:", error);
        statusMsg.style.color = 'var(--cor-perigo)';
        statusMsg.textContent = '❌ Ocorreu um erro de conexão com a Planilha.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Registrar na Planilha';
      }
    });
  </script>
</body>
</html>
